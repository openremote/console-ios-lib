name: CI/CD

on:
  # Push on main excluding tags
  push:
    branches:
      - 'main'
    tags-ignore:
      - '*.*'

  # PR
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:
    name: CI/CD
    runs-on: macos-15
    permissions:
      actions: read
      checks: write
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install tooling
        run: |
          brew install xcresultparser swiftlint
          curl --fail --location --silent --show-error \
            https://raw.githubusercontent.com/SonarSource/sonar-scanning-examples/de677435078ca8873be775e7f718d8dd0669c03d/swift-coverage/swift-coverage-example/xccov-to-sonarqube-generic.sh \
            -o xccov-to-sonarqube-generic.sh

      - name: Swift Package Manager cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Generate SwiftLint SARIF
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          swiftlint lint --no-cache --quiet --config .swiftlint.yml --reporter sarif ORLib > swiftlint.sarif || true

      - name: Upload SwiftLint SARIF
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: swiftlint.sarif
          category: swiftlint

      - name: Generate SwiftLint JSON Report
        if: ${{ !cancelled() }}
        run: |
          swiftlint lint --no-cache --quiet --config .swiftlint.yml --reporter json ORLib > swiftlint.json || true

      - name: Build and test
        run: |
          xcodebuild test -project ORLib.xcodeproj -sdk iphoneos \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' -scheme ORLib -resultBundlePath ORLib.xcresult

      - name: Extract JUnit test report
        run: |
          xcresultparser -o junit ORLib.xcresult > junit.xml
        if: ${{ !cancelled() }}

      - name: Convert test coverage to SonarQube format
        if: ${{ always() && !cancelled() && hashFiles('ORLib.xcresult/**') != '' }}
        run: |
          bash xccov-to-sonarqube-generic.sh ORLib.xcresult/ > Coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        if: ${{ !cancelled() }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Publish Test Report with Insights
        uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa # v1.0.28
        if: ${{ !cancelled() }}
        with:
          report-path: 'junit.xml'
          integrations-config: |
            {
              "junit-to-ctrf": {
                "enabled": true,
                "action": "convert",
                "options": {
                  "output": "./ctrf-reports/ctrf-report.json",
                  "toolname": "junit-to-ctrf",
                  "useSuiteName": false,
                  "env": {
                    "appName": "ORLib"
                  }
                }
              }
            }
          github-report: true
          upload-artifact: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Test Report
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: ${{ !cancelled() }}
        with:
          name: ORLib Tests 
          path: junit.xml
          reporter: jest-junit
